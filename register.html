{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join AI Navigator and discover the best AI tools</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required minlength="4">
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p class="mt-2" style="color:var(--text-muted);font-size:0.88rem">
            Already have an account? <a href="/login">Sign in →</a>
        </p>
    </div>
</div>
{% endblock %}
